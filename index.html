<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innovation Club Member Poll</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>INNOVATION CLUB MEMBER POLL</h1>
    <div class="top-bar">
      <a href="rules.html" class="rules-button">View Voting Rules</a>
    </div>

    <form action="https://hook.eu2.make.com/1vkuqbvwy930t1pq319o6hfl8tlk6c06" method="POST" id="pollForm">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="class">Class</label>
      <input type="text" id="class" name="class" required />

      <label for="section">Section</label>
      <input type="text" id="section" name="section" required />

      <label for="admission_number">Admission Number</label>
      <input type="text" id="admission_number" name="admission_number" required />

      <label>Your Vote</label>
      <p id="vote-question" class="subtitle"></p>
      <div id="vote-options"></div>

      <!-- Hidden field to store selected vote(s) -->
      <input type="hidden" name="vote" id="voteFinal" />

      <label for="remarks">Remarks</label>
      <textarea id="remarks" name="remarks"></textarea>

      <button type="submit">SUBMIT</button>

      <script>
        let isMultiple = false;

        fetch("questions.json")
          .then(res => res.json())
          .then(data => {
            if (!data.active) {
              window.location.href = "closed.html";
              return;
            }

            isMultiple = data.multiple;
            document.getElementById("vote-question").textContent = data.question;
            const container = document.getElementById("vote-options");

            if (isMultiple) {
              data.options.forEach((option, i) => {
                const label = document.createElement("label");
                label.style.display = "block";
                label.innerHTML = `<input type="checkbox" name="vote_option" value="${option}" /> ${option}`;
                container.appendChild(label);
              });
            } else {
              const select = document.createElement("select");
              select.name = "vote_option";
              select.id = "vote-dropdown";
              select.required = true;

              data.options.forEach(option => {
                const opt = document.createElement("option");
                opt.value = option;
                opt.textContent = option;
                select.appendChild(opt);
              });

              container.appendChild(select);
            }
          });

        // On form submit, collect vote(s)
        document.getElementById("pollForm").addEventListener("submit", function (e) {
          let finalVote = "";

          if (isMultiple) {
            const checked = [...document.querySelectorAll('input[name="vote_option"]:checked')];
            finalVote = checked.map(cb => cb.value).join(", ");
          } else {
            const selected = document.querySelector('select[name="vote_option"]');
            finalVote = selected ? selected.value : "";
          }

          document.getElementById("voteFinal").value = finalVote;
        });
      </script>
    </form>
  </div>

  <div class="watermark">
    <img src="logo.png" alt="Innovation Club Logo" />
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innovation Club Member Poll</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <div class="container">
    <h1>INNOVATION CLUB MEMBER POLL</h1>
    <h2 id="session-title" class="subtitle" style="margin-bottom: 2rem;"></h2>
    <div class="top-bar">
      <a href="rules.html" class="rules-button">View Voting Rules</a>
    </div>

    <!-- 🌐 Now using Make webhook -->
    <form action="https://hook.eu2.make.com/1vkuqbvwy930t1pq319o6hfl8tlk6c06" method="POST" id="pollForm">
     
      <input type="hidden" name="session" id="session-hidden" />

      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="class">Class</label>
      <input type="text" id="class" name="class" required />

      <label for="section">Section</label>
      <input type="text" id="section" name="section" required />
      
      <label for="admission_number">Admission Number</label>
      <input type="text" id="admission_number" name="admission_number" required />

      <label for="vote">Your Vote</label>
      <p id="vote-question" class="subtitle"></p>
      <select name="vote" id="vote-dropdown" required></select>
      <input type="hidden" name="votes" id="votes-hidden" />


      <label for="remarks">Remarks</label>
      <textarea id="remarks" name="remarks"></textarea>

      <button type="submit">SUBMIT</button>
    </form>
  </div>

  <div class="watermark">
    <img src="logo.png" alt="Innovation Club Logo" />
  </div>

</body>
</html>
